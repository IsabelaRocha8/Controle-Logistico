<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previsão de Chegada - Controle Logístico</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-shipping-fast"></i>
                <h2>XCMG</h2>
            </div>
            <nav class="sidebar-menu">
                <a href="index.html" class="menu-link">
                    <i class="fas fa-chart-pie"></i>
                    <span>Dashboard</span>
                </a>
                <a href="cadastro.html" class="menu-link">
                    <i class="fas fa-ship"></i>
                    <span>Cadastro Marítimo</span>
                </a>
                <a href="cadastro-aereo.html" class="menu-link">
                    <i class="fas fa-plane"></i>
                    <span>Cadastro Aéreo</span>
                </a>
                <a href="historico.html" class="menu-link">
                    <i class="fas fa-history"></i>
                    <span>Histórico</span>
                </a>
                <a href="previsao.html" class="menu-link active">
                    <i class="fas fa-calendar-alt"></i>
                    <span>Previsão de Chegada</span>
                </a>
                <a href="nil.html" class="menu-link">
                    <i class="fas fa-file-alt"></i>
                    <span>Emitir NIL</span>
                </a>
                <a href="historicoNIL.html" class="menu-link">
                    <i class="fas fa-print"></i>
                    <span>Histórico NIL</span>
                </a>
            </nav>
        </aside>

        <main class="main-wrapper">
            <header class="header">
                <div class="header-left">
                    <h1>Previsão de Chegada</h1>
                </div>
                <div class="header-right">
                    <div class="user-profile">
                        <i class="fas fa-user-circle"></i>
                        <span id="nomeUsuario">Admin</span>
                    </div>
                    <button class="btn-logout" onclick="sair()">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </header>

            <div class="dashboard-content">
                <div class="kpi-row">
                    <div class="kpi-card">
                        <div class="kpi-info">
                            <h3 id="kpiAtrasados">0</h3>
                            <p>Atrasados</p>
                        </div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-info">
                            <h3 id="kpiHoje">0</h3>
                            <p>Previsto para Hoje</p>
                        </div>
                    </div>
                </div>

                <div class="form-container">
                    <h3 style="color: #00469B; margin-bottom: 20px;">Registrar Nova Previsão</h3>
                    <form id="formPrevisao">
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="modalPrevisao">MODAL *</label>
                                <select id="modalPrevisao" required onchange="configurarObrigatoriedade()">
                                    <option value="">Selecione</option>
                                    <option value="Maritimo">Marítimo</option>
                                    <option value="Aereo">Aéreo</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="sjPrevisao">SJ *</label>
                                <input type="text" id="sjPrevisao" required style="text-transform: uppercase;">
                            </div>
                            <div class="form-group">
                                <label for="conteudoPrevisao" id="labelConteudo">CONTEÚDO *</label>
                                <input type="text" id="conteudoPrevisao" required style="text-transform: uppercase;">
                            </div>
                            <div class="form-group">
                                <label for="transportadoraPrevisao" id="labelTransportadora">TRANSPORTADORA *</label>
                                <input type="text" id="transportadoraPrevisao" required style="text-transform: uppercase;">
                            </div>
                            <div class="form-group">
                                <label for="dataPrevisao">DATA PREVISTA *</label>
                                <input type="date" id="dataPrevisao" required>
                            </div>
                            <div class="form-group">
                                <label for="containerPrevisao">CONTAINER *</label>
                                <div style="display: flex; gap: 8px;">
                                    <input type="text" id="containerPrevisao" maxlength="11" style="text-transform: uppercase; flex: 1;">
                                    <button type="button" class="btn btn-secondary" onclick="adicionarContainer()">
                                        <i class="fas fa-plus"></i>
                                    </button>
                                </div>
                                <small id="hintContainer">Formato ISO 6346: AAAA9999999</small>
                            </div>
                        </div>

                        <div id="listaContainers" style="margin-top: 16px; display: flex; flex-wrap: wrap; gap: 8px;"></div>

                        <div id="mensagemErroPrevisao" class="error-message"></div>
                        <div id="mensagemSucessoPrevisao" class="success-message"></div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Salvar Previsão
                            </button>
                        </div>
                    </form>
                </div>

                <div id="containerCards" class="container-cards-grid"></div>
            </div>
        </main>
    </div>

    <script src="js/apiClient.js"></script>
    <script src="js/store.js"></script>
    <script src="script.js"></script>
    <script src="previsao.js"></script>
</body>
</html>
